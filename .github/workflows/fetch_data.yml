name: Fetch Fallback Data & Generate Sitemap

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show Node version
        run: |
          node -v
          npm -v

      - name: Fetch fallback data
        run: |
          echo "========== FETCH FALLBACK =========="
          node scripts/fetch_fallback_data.mjs

      - name: Generate sitemap
        run: |
          echo "========== GENERATE SITEMAP =========="
          node scripts/generate_sitemap.mjs

      - name: Verify generated files
        run: |
          echo "========== PUBLIC DIRECTORY =========="
          ls -lah public

          echo ""
          echo "========== FILE SIZES =========="
          du -h public/fallback_discussions.json || true
          du -h public/sitemap.xml || true

      - name: Git status
        run: |
          git status

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/fallback_discussions.json
          git add public/sitemap.xml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update fallback data and sitemap"
          git push